appId: com.salestrackpro.app
productName: SalesTrack Pro
copyright: Copyright © 2026 SalesTrack Pro

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - "!out/**/*.map"

# Copy sql.js WASM into the packaged app's resources folder
# Connection.ts reads it from process.resourcesPath at runtime
extraResources:
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SalesTrack Pro

publish:
  provider: github
  owner: Tocknpn
  repo: KPV_KPI_tracking
  # electron-builder defaults new releases to "draft" — drafts are invisible to the
  # GitHub API endpoint electron-updater queries, so every client-side update check fails
  # with "No published versions on GitHub" until someone manually publishes the draft on
  # github.com. releaseType: release publishes it immediately on upload instead.
  releaseType: release
