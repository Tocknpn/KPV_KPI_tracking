appId: com.salestrackpro.app
productName: SalesTrack Pro
copyright: Copyright © 2026 SalesTrack Pro

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - "!out/**/*.map"

# better-sqlite3 ships a native .node binary — must stay unpacked from asar (a native binary
# can't be loaded/mmap'd from inside the asar archive at runtime).
asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SalesTrack Pro

publish:
  provider: github
  owner: Tocknpn
  repo: KPV_KPI_tracking
  # electron-builder defaults new releases to "draft" — drafts are invisible to the
  # GitHub API endpoint electron-updater queries, so every client-side update check fails
  # with "No published versions on GitHub" until someone manually publishes the draft on
  # github.com. releaseType: release publishes it immediately on upload instead.
  releaseType: release
